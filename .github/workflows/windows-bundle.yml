name: windows-bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release artifacts
        shell: cmd
        run: installer\build_windows.bat
      - name: Verify installer outputs
        shell: powershell
        run: |
          $expected = @(
            'installer\out\Aeterna-setup.exe',
            'installer\out\Aeterna.exe'
          )
          foreach ($path in $expected) {
            if (-not (Test-Path $path)) {
              throw "Missing expected artifact: $path"
            }
          }
      - name: Silent install and smoke test
        shell: powershell
        run: |
          $installer = Resolve-Path 'installer\out\Aeterna-setup.exe'
          $target = Join-Path $env:LOCALAPPDATA 'Programs\Aeterna'
          Start-Process -FilePath $installer -ArgumentList '/S' -Wait
          powershell -ExecutionPolicy Bypass -File installer\install_test_check.ps1 -ShortcutName 'Aeterna'
          $exe = Join-Path $target 'Aeterna.exe'
          if (-not (Test-Path $exe)) {
            throw "Installed executable not found: $exe"
          }
          $process = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 10
          $sidecar = Get-Process | Where-Object { $_.ProcessName -like 'aeterna-sidecar*' } | Select-Object -First 1
          if (-not $sidecar) {
            throw 'Sidecar process did not start after launching the installed app.'
          }
          try {
            $health = Invoke-WebRequest 'http://127.0.0.1:8000/api/health' -UseBasicParsing -TimeoutSec 5
            if ($health.StatusCode -ne 200) {
              throw "Unexpected backend health status: $($health.StatusCode)"
            }
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
            Get-Process | Where-Object { $_.ProcessName -like 'aeterna-sidecar*' -or $_.ProcessName -like 'aeterna-core*' } | Stop-Process -Force -ErrorAction SilentlyContinue
          }
      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: aeterna-windows-bundle
          path: installer/out
